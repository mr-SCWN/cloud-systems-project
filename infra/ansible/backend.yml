- hosts: all
  become: yes

  vars:
    db_name: netflix_db
    db_user: netflix_user
    db_password: netflix_pass
    db_host: 192.168.56.11
    db_port: 5432

  tasks:
    - name: update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: install backend system packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - curl
        state: present

    - name: wait until database port is reachable
      ansible.builtin.wait_for:
        host: "{{ db_host }}"
        port: "{{ db_port }}"
        timeout: 120

    - name: create backend virtual environment
      ansible.builtin.command: python3 -m venv /opt/netflix-backend-venv
      args:
        creates: /opt/netflix-backend-venv/bin/activate

    - name: install backend Python dependencies
      ansible.builtin.pip:
        virtualenv: /opt/netflix-backend-venv
        requirements: /vagrant/backend/requirements.txt

    - name: create systemd service for FastAPI backend
      ansible.builtin.template:
        src: templates/netflix-api.service.j2
        dest: /etc/systemd/system/netflix-api.service
        mode: "0644"
      notify:
        - reload systemd
        - restart backend

    - name: enable and start backend service
      ansible.builtin.service:
        name: netflix-api
        enabled: yes
        state: started

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: restart backend
      ansible.builtin.service:
        name: netflix-api
        state: restarted